services:
  postgres:
    container_name: postgres
    image: postgres:12.2
    environment:
      - POSTGRES_DB=nakama
      - POSTGRES_PASSWORD=123456
    volumes:
      - ./pg-data:/var/lib/postgresql/data
    expose:
      - "8080"
      - "5432"
    ports:
      - "5432:5432"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "nakama"]
      interval: 3s
      timeout: 3s
      retries: 5
  nakama:
    build: .
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:123456@postgres:5432/nakama &&
        exec /nakama/nakama --name nakama1 --config /nakama/data/local.yml --database.address postgres:123456@postgres:5432/nakama --logger.level DEBUG --session.token_expiry_sec 7200        
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
    #取消挂载目录，直接使用 Dockerfile 打包进镜像的 local.yml + build/index.js
    #  - ./data:/nakama/data
    #或者只为持久化日志、存档
      - ./nakama-logs:/nakama/data/logs
    expose:
      - "7349"
      - "7350"
      - "7351"
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
